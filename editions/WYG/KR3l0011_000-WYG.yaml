body:
  text: 提要教坊記小説家𩔖一雜事之屬臣等謹案教坊記一卷唐崔令欽撰是書唐書藝文志著録又總集𩔖中載令欽注庾信哀江南賦一卷然均不言令欽何許人蓋修唐書時其始末已無考矣所記多開元中猥雜之事故陳振孫譏其鄙俗然其後記一篇諄諄於聲色之亡國雖禮為尊諱無一語指斥元宗而厯引漢成帝髙緯陳叔寶慕容熙其言剴切而著明乃知令欽此書本以示戒非以示勸唐志列之於經部樂𩔖固為失當然其風㫖有足取者雖謂曲終奏雅亦無不可不但所列曲調二百二十五名足為詞家考證也幽閒鼔吹小説家𩔖一雜事之屬臣等謹案幽閒鼓吹一卷唐張固撰固始末未詳是書舊有明顧元慶跋稱共二十五篇與晁公武讀書志所言合今檢此本乃二十六篇蓋誤斷元載及其子一條為二耳元慶又稱固在懿僖間採摭宣宗遺事則殊不然書中元和㑹昌間事不一而足非僅記宣宗事也又稱姚文公唐詩鼔吹序謂宋髙宗退居徳夀宫嘗纂唐宋遺事為幽閒鼓吹其言不知何據元慶亦以為疑今考唐書藝文志小説家有張固幽閒鼔吹一卷則出自唐人更無疑義縱髙宗别有幽閒鼔吹亦書名偶同不得以此本當之矣固所記雖篇帙寥寥而其事多闗法戒非造作虚辭無裨考證者比在唐人小説之中猶差為切實可據焉松窓雜録小説家𩔖一雜事之屬臣等謹案松窓雜録一卷按此書書名撰人諸本互異唐志作松窓録一卷不著撰人宋志作松窓小録一卷題李濬撰文獻通考作松窓雜録一卷題韋濬撰陳文燭歴代小史則書名與通考同人名與宋志同蓋𫝊刻舛訛未詳孰是此本為范氏天一閣舊抄書名人名並與厯代小史同今姑從以著録亦三占從二之義也其文與陳氏所刻大概相合惟多中宗召宰相一條及姚崇姨母盧氏一條以司馬光通鑑考異證之其中宗一條實為原書所有知陳本為佚脱矣書中記唐明皇事頗詳整可觀載李泌對徳宗語論明皇得失亦瞭若指掌通鑑所載泌事多採取李蘩鄴侯家𫝊纎悉必録而獨不及此語是亦足以補史闕惟謂中宗召宰相蘇瓌李嶠子進見二子皆童年因令奏所通書頲應曰木從繩則正后從諫則聖嶠子亦進曰斮朝涉之脛剖賢人之心上曰蘇瓌有子李嶠無兒今攷頲於則天長安二年已為御史瓌為相時頲為中書舍人父子同掌樞密並非童年故司馬光深斥其説頗不免於誣妄云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
