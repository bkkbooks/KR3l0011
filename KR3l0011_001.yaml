  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0011_WYG_001-1a, image: WYG1035/WYG1035-0543c.png}
body:
  text: 教坊記唐崔令欽撰西京右教坊在光宅坊左教坊在延政坊右多善歌左多工舞盖相因習東京兩教坊俱在眀義坊而右在南左在北也坊南西門外即苑之東也其間有頃餘水泊俗謂之月陂形似偃月故以名之妓女入宜春院謂之内人亦曰前頭人常在上前也其家猶在教坊謂之内人家敕有司給賜同十家雖數十家猶故以十家呼之每月二日十六日内人毋得以女對無母則姊妺若姑一人對十家就本落餘内人竝坐内教坊對内人生日則許其母姑姊妹皆來對其對所如式樓下戲出隊宜春院人少即以雲韶添之雲韶謂之宫人盖賤􅘗也非直美惡殊貌居然易辨明内人帯魚宫人則否平人女以容色選入内者教習琵琶三絃箜篌筝等者謂搊彈家開元十一年初製聖夀樂令諸女衣五方色衣以歌舞之宜春院女教一日便堪上塲惟搊彈家彌月不成至戯日上令宜春院人為首尾搊彈家在行間令學其舉手也宜春院亦有工拙必擇尤者為首尾首既引隊衆所屬目故須能者樂將闋稍稍失隊餘二十許人舞曲終謂之合殺尤要快健所以更須能者也聖夀樂舞衣襟皆各繡一大窠皆随其衣本色製純縵衫下纔及帯若短汗衫者以籠之所以藏繡窠也舞人初出樂次皆是縵衣舞至苐二疉相聚場中即于衆中從領上抽去籠衫各内懐中觀者忽見衆女咸文繡炳煥莫不驚異凡欲出戲所司先進曲名上以墨㸃者即舞不㸃者即否謂之進㸃戯日内伎出舞教坊人惟得舞伊州五天重來疉不離此兩曲餘盡讓内人也垂手羅回波樂蘭陵王春鸎半社渠借席烏夜啼之屬謂之軟舞阿遼柘枝黄麞拂林大渭州達摩之屬謂之健舞凡樓下兩院進雜婦女上必召内人姊妹入内賜食因謂之曰今日娘子不須唱歌且饒姊妺並兩院婦女于是内妓與兩院歌人更代上舞臺唱歌内妓歌則黄幡綽賛揚之兩院人歌則幡綽輙訾詬之有肥大年長者即呼為屈突干阿姑貌稍胡者即云康太賔阿妹隨𩔖名之摽弄百端諸家散樂呼天子為崖公以歡喜為蜆斗以每日長在至尊左右為長入筯斗裴承恩妹大娘善歌兄以配竿木侯氏又與長入趙解愁私通侯氏有疾因欲藥殺之王輔國鄭銜山與解愁相知又是侯鄉里宻謂薛忠王琰曰為我語侯大兄晚間有人送粥慎莫喫及期果有贈粥者侯遂不食其夜裴大娘引解愁謀殺其夫銜山願擎土袋燈既滅銜山乃以土袋置侯身上不壓口鼻餘黨不之覺也比眀侯氏不死有司以聞上令范安窮究其事于是趙解愁等皆决一百衆皆不知侯氏不掩口鼻而不死也或言土袋綻裂故活是以諸女戯相謂曰自今後縫壓壻土袋當加意夾縫縫之更勿令開綻也坊中諸女以氣𩔖相似約為香火兄弟每多至十四五人少不下八九軰有兒郎聘之者輙被以婦人稱呼即所聘者兄見呼為新婦弟見呼為嫂也兒郎有任宫僚者宫忝與内人對同日垂到内門車馬相逢或褰車簾呼阿嫂若新婦者同黨求逹殊為怪異問被呼者笑而不答兒郎既娉一女其香火兄弟多相奔云學突厥法又云我兄弟相憐愛欲得嘗其婦也主者知亦不妬他香火即不通蘇五奴妻張少娘善歌舞有邀迓者五奴輙隨之前人欲得其速醉多勸酒五奴曰但多與我錢喫鎚子亦醉不煩酒也今呼鬻妻者為五奴自蘇始范漢女大娘子亦是竿木家開元二十一年出内有姿媚而微愠羝謂腋氣也曲名獻天花和風栁美唐風透碧空巫山女度春江衆仙樂大定樂龍飛樂慶雲樂繞殿樂泛舟樂抛毬樂清平樂放鷹樂夜半樂破陣樂還京樂天下樂同心樂賀聖朝奉聖樂千秋樂泛龍舟泛玉池春光好迎春花鳳樓春負陽春帝臺春繞池春滿園春長命女武媚娘杜韋娘栁青娘楊栁枝栁含煙朁楊栁倒垂栁浣溪沙浪淘沙撒金沙紗牕恨金簑嶺隔簾聴恨無媒望梅花望江南好郎君想夫憐别趙十憶趙十念家山紅羅襖烏夜啼墻頭花摘得新北門西煮羊頭河瀆神二郎神醉鄉遊醉花間燈下見醉思鄉太邉郵太白星剪春羅㑹嘉賔當庭月思帝鄉歸國遥感皇恩戀皇恩皇帝感戀情深憶漢月憶先皇聖無憂定風波木蘭花更漏長菩薩蠻破南蠻八拍蠻芳草洞守陵宫臨江仙虞美人映山紅獻忠心卧沙堆怨黄沙遐方怨夀齊天送征衣送行人望梅愁阮郎迷牧羊怨掃市舞鳳歸雲羅裙帯同心結一捻鹽阿也黄刼家雞緑頭鴨下水舩留客住離别難喜長新羌心怨女王國繚踏歌天外閒賀皇化五雲仙滿堂花南天竺定西畨荷葉杯感庭秋月遮樓感恩多長相思西江月拜新月上行杯團亂旋喜春鶯大獻夀鵲踏枝萬年歡曲玉管傾杯樂謁金門巫山一段雲望月波羅門後庭花西河獅子西河劒氣怨陵三臺儒士謁金門武士朝金闕掺工不下麥秀兩岐金雀兒滻水吟玉搔頭鸚鵡杯路逢花初漏滿相見歡蘇幕遮遊春苑黄鍾樂訴衷情折紅蓮征步郎洞仙歌太平樂長慶樂喜囘鑾漁父引喜秋天大郎神胡渭州夢江南濮陽女静戎煙三臺上韻中韻下韻普恩光戀情歡楊下采桑大酺樂合羅縫蘇合香山鷓鴣七星管醉公子朝天木笪㸔月宫宫人怨歎疆場拂霓裳駐征遊泛濤溪胡相問廣陵散帝歸京喜還京遊春夢柘枝引留諸錯如意娘黄羊兒蘭陵王小秦王花黄發大眀樂望逺行思友人唐四姐放鶻樂鎮西樂金殿樂南歌子八拍子魚歌子七夕子十拍子措大子風流子呉吟子生查子胡醉子山花子水仙子緑鈿子金錢子竹枝子天仙子赤棗子千秋子心事子胡蝶子沙磧子酒泉子迷神子得蓬子剉碓子麻婆子紅娘子甘州子厯刺子鎮西子北庭子采蓮子破陣子劒器子獅子女冠子仙鶴子穆護子賛普子蕃將子囘戈子帯竿子摸魚子南鄉子大吕子南浦子撥棹子河滿子曹大子引角子隊踏子水沽子化生子金娥子捨麥子多利子毗砂子上元子西溪子劒閣子嵇琴子莫壁子胡攅子唧唧子翫花子西國朝天大曲名踏金蓮緑腰凉州薄媚賀聖樂伊州甘州泛龍舟采桑千秋樂霓裳玉樹後庭花伴侣雨霖鈴柘枝胡僧破平翻相駞逼吕太后突厥三臺大寳一斗鹽羊頭神大姊舞大姊急月記斷弓絃碧霄吟穿心蠻羅步底囘波樂千春樂龜兹樂醉渾脱映山雞昊破四㑹子安公子舞春風迎春風㸔江波寒鴈子又中春翫中秋迎仙客同心結大面出北齊蘭陵王長恭性膽勇而貌婦人自嫌不足以威敵乃刻木為假面臨陣著之因為此戲亦入歌曲踏謡娘北齊有人姓蘇䶌鼻實不仕而自號為郎中嗜飲酗酒每醉輙毆其妻妻銜悲訴于鄰里時人㺯之丈夫著婦人衣徐步入塲行歌每一疉㫄人齊聲和之云踏謡和來踏謡娘苦和來以其且步且歌故謂之踏謡以其稱寃故言苦及其夫至則作毆鬭之状以為笑樂今則婦人為之遂不呼郎中但云阿叔子調弄又加典庫全失舊旨或呼為談容娘又非烏夜啼宋彭城王義康衡陽王義季弟囚之潯陽後宥之使未逹衡王家人扣二王所囚院曰昨夜烏夜啼官當有赦少頃使至故有此曲亦入琴操安公子隋大業末煬帝幸揚州樂人王令言以年老不去其子從焉其子在家彈琵琶令言驚問此曲何名其子曰内裏新翻曲子名安公子令言流涕悲愴謂其子曰爾不須扈從大駕必不回子問其故令言曰此曲宫聲往而不返宫為君吾是以知之春鶯囀髙宗曉聲律晨坐聞鶯聲命樂工白明達寫之遂有此曲記曰夫以㢘潔之美而道之者寡驕淫之醜而陷之者衆何哉志意劣而嗜慾强也借如涉畏途不必皆死而人知懼溺聲色則必傷夭而莫之思不其惑歟且人之生身所稟五常耳至有悦其妻而圗其夫前古多矣是違仁也納異寵而薄糟糠凡今衆矣是忘義也重袵席之虞輕宗祀之敬是廢禮也貪耳目之玩忽禍敗之端是無智也心有所愛則靦冒茍得不顧宿諾是棄信也敦諭履仁蹈義修禮任智而信以成之嗚呼國君保之則比徳堯舜士庶由之則齊名周孔矣當為永代表式寜止一時稱舉儻謂修小善而無益犯小惡而無傷殉嗜慾近情忘性命大節施之于國則國風敗行之于家則家法壊敗與壊不其痛哉是以楚荘悔懼斥遣夏氏宋武納諫遽絶慕容終成霸業號為良主豈比髙緯以馮小憐滅身叔寳以張貴妃亡國漢成以昭儀絶冢嗣燕熙以符氏覆邦家乎非無元龜自有人鑑遂形簡牘敢告後賢教坊記
